syntax = "proto3";

package varta.milstd.v1;

import "varta/task/catalog/v1/task_definition.proto";

message SpaceSymbol {
  SpaceEntity entity = 1 [(varta.task.catalog.v1.field) = {
    widget: WIDGET_ENUM
    label: "Entity"
    required: true
  }];
  optional SpaceModifier1 modifier1 = 2 [(varta.task.catalog.v1.field) = {
    widget: WIDGET_ENUM
    label: "Modifier 1"
  }];
  optional SpaceModifier2 modifier2 = 3 [(varta.task.catalog.v1.field) = {
    widget: WIDGET_ENUM
    label: "Modifier 2"
  }];
}

