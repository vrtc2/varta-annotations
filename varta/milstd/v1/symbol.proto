// MIL-STD-2525D symbol definition.
// The frontend assembles the full SIDC string from these fields plus
// MilitaryView.disposition (which maps to SIDC Standard Identity, position 4).
// Version (positions 1-2) and Context (position 3) are set by the system.
message MilStd2525Symbol {
  oneof symbol_set {
    option (varta.task.catalog.v1.oneof_field) = {
      label: "Symbol Set"
      required: true
    };
    AirSymbol air = 1 [(varta.task.catalog.v1.oneof_value) = {label: "Air"}];
    AirMissileSymbol air_missile = 2 [(varta.task.catalog.v1.oneof_value) = {label: "Air Missile"}];
    SpaceSymbol space = 3 [(varta.task.catalog.v1.oneof_value) = {label: "Space"}];
    SpaceMissileSymbol space_missile = 4 [(varta.task.catalog.v1.oneof_value) = {label: "Space Missile"}];
    LandUnitSymbol land_unit = 5 [(varta.task.catalog.v1.oneof_value) = {label: "Land Unit"}];
    LandCivilianSymbol land_civilian = 6 [(varta.task.catalog.v1.oneof_value) = {label: "Land Civilian"}];
    DismountedIndividualSymbol dismounted_individual = 7 [(varta.task.catalog.v1.oneof_value) = {label: "Dismounted Individual"}];
    LandEquipmentSymbol land_equipment = 8 [(varta.task.catalog.v1.oneof_value) = {label: "Land Equipment"}];
    LandInstallationSymbol land_installation = 9 [(varta.task.catalog.v1.oneof_value) = {label: "Land Installation"}];
    SeaSurfaceSymbol sea_surface = 10 [(varta.task.catalog.v1.oneof_value) = {label: "Sea Surface"}];
    SubsurfaceSymbol subsurface = 11 [(varta.task.catalog.v1.oneof_value) = {label: "Subsurface"}];
    MineWarfareSymbol mine_warfare = 12 [(varta.task.catalog.v1.oneof_value) = {label: "Mine Warfare"}];
    ActivitySymbol activity = 13 [(varta.task.catalog.v1.oneof_value) = {label: "Activity"}];
    CyberspaceSymbol cyberspace = 14 [(varta.task.catalog.v1.oneof_value) = {label: "Cyberspace"}];
    SignalsIntelligenceSymbol signals_intelligence = 15 [(varta.task.catalog.v1.oneof_value) = {label: "Signals Intelligence"}];
  }

  optional SymbolStatus status = 20 [(varta.task.catalog.v1.field) = {
    widget: WIDGET_ENUM
    label: "Status"
  }];

  optional HqTfDummy hq_tf_dummy = 21 [(varta.task.catalog.v1.field) = {
    widget: WIDGET_ENUM
    label: "HQ / Task Force / Dummy"
  }];

  optional EchelonMobility echelon_mobility = 22 [(varta.task.catalog.v1.field) = {
    widget: WIDGET_ENUM
    label: "Echelon / Mobility"
  }];

  optional uint32 quantity = 23 [(varta.task.catalog.v1.field) = {
    widget: WIDGET_INTEGER
    label: "Quantity"
  }];

  optional CommonModifier1 common_modifier1 = 24 [(varta.task.catalog.v1.field) = {
    widget: WIDGET_ENUM
    label: "Common Modifier 1"
  }];

  optional CommonModifier2 common_modifier2 = 25 [(varta.task.catalog.v1.field) = {
    widget: WIDGET_ENUM
    label: "Common Modifier 2"
  }];

  // ISO 3166-1 alpha-2 country code (e.g. "UA", "US").
  // milsymbol renders a small country flag on the symbol.
  optional string country = 26 [(varta.task.catalog.v1.field) = {
    widget: WIDGET_TEXT
    label: "Country"
    placeholder: "UA"
    hint: "ISO 3166-1 alpha-2"
  }];

  // SIDC Position 3: Reality / Exercise / Simulation.
  // Defaults to Reality (0) when not set.
  optional SymbolContext context = 27 [(varta.task.catalog.v1.field) = {
    widget: WIDGET_ENUM
    label: "Context"
  }];
}

// SIDC Position 3: Reality, Exercise, or Simulation context.
// Enum value maps directly to SIDC digit (0=Reality, 1=Exercise, 2=Simulation).
enum SymbolContext {
  SYMBOL_CONTEXT_UNSPECIFIED = 0 [(varta.task.catalog.v1.enum_value) = {label: "Reality"}];
  SYMBOL_CONTEXT_EXERCISE = 1 [(varta.task.catalog.v1.enum_value) = {label: "Exercise"}];
  SYMBOL_CONTEXT_SIMULATION = 2 [(varta.task.catalog.v1.enum_value) = {label: "Simulation"}];
}

// SIDC Position 7: Present or Planned status
enum SymbolStatus {
  SYMBOL_STATUS_UNSPECIFIED = 0 [(varta.task.catalog.v1.enum_value) = {label: "Unspecified"}];
  SYMBOL_STATUS_PRESENT = 1 [(varta.task.catalog.v1.enum_value) = {label: "Present"}];
  SYMBOL_STATUS_PLANNED = 2 [(varta.task.catalog.v1.enum_value) = {label: "Planned / Anticipated"}];
}

// SIDC Position 8: Headquarters, Task Force, Dummy indicators
enum HqTfDummy {
  HQ_TF_DUMMY_UNSPECIFIED = 0 [(varta.task.catalog.v1.enum_value) = {label: "Unspecified"}];
  HQ_TF_DUMMY_FEINT_DUMMY = 1 [(varta.task.catalog.v1.enum_value) = {label: "Feint / Dummy"}];
  HQ_TF_DUMMY_HEADQUARTERS = 2 [(varta.task.catalog.v1.enum_value) = {label: "Headquarters"}];
  HQ_TF_DUMMY_FEINT_DUMMY_HEADQUARTERS = 3 [(varta.task.catalog.v1.enum_value) = {label: "Feint / Dummy Headquarters"}];
  HQ_TF_DUMMY_TASK_FORCE = 4 [(varta.task.catalog.v1.enum_value) = {label: "Task Force"}];
  HQ_TF_DUMMY_FEINT_DUMMY_TASK_FORCE = 5 [(varta.task.catalog.v1.enum_value) = {label: "Feint / Dummy Task Force"}];
  HQ_TF_DUMMY_TASK_FORCE_HEADQUARTERS = 6 [(varta.task.catalog.v1.enum_value) = {label: "Task Force Headquarters"}];
  HQ_TF_DUMMY_FEINT_DUMMY_TASK_FORCE_HEADQUARTERS = 7 [(varta.task.catalog.v1.enum_value) = {label: "Feint / Dummy Task Force HQ"}];
}

